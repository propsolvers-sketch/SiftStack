name: SiftStack Daily Sweep

# Daily fire is driven by EXTERNAL CRON, not GHA's `schedule:` trigger.
#
# A cronjob at cron-job.org (account: propsolvers@gmail.com) POSTs to
# https://api.github.com/repos/propsolvers-sketch/SiftStack/actions/workflows/daily-sweep.yml/dispatches
# at 02:30 America/Chicago daily (DST-handled by cron-job.org, so Slack
# reliably lands at ~3:30 AM local year-round). Uses a fine-grained GitHub
# PAT (Actions: Read+Write, SiftStack only, expires 2026-08-27).
#
# Why no `schedule:` trigger here: GHA's scheduled cron proved unreliable —
# delayed 4–11 hr on free tier (2026-05-22 → 27), then silently stopped
# firing entirely for 2+ consecutive days (2026-05-28 / 29) even on GitHub
# Pro with a correct cron and `state: active`. The pattern matches GHA's
# undocumented "deprioritize on consecutive failures" behavior, and once
# tripped it doesn't recover. workflow_dispatch is provably 100% reliable.
#
# History (left for context; do not re-add `schedule:` without solving the
# underlying GHA cron-reliability issue):
#   2026-05-22 → 26 (free tier, 11:00 UTC cron): delays 6.5 / 3.8 / 3.9 / 6.3 / 8.5 hr
#   2026-05-26 → moved to 07:00 UTC hoping for an overnight-quiet window
#   2026-05-27 (07:00 UTC cron, free tier): delayed 11 hr to 18:08 UTC — quiet-window theory disproved
#   2026-05-28 morning: upgraded to GitHub Pro; cron stayed paused (no schedule fires for 2 days)
#   2026-05-29: cut over to cron-job.org → workflow_dispatch API; removed `schedule:` trigger
#
# Manual workflow_dispatch from the GitHub Actions UI still works for ad-hoc
# runs (same path the external cron uses).
on:
  workflow_dispatch:

permissions:
  contents: write  # required so the job can commit seen_ids.json back
  actions: read    # Sunday obit-refresh step lists + downloads prior artifacts

jobs:
  daily-sweep:
    runs-on: ubuntu-latest
    # 360 min budget. Bumped 2026-07-01 from 240 after Wednesday's
    # high-volume foreclosure run cancelled at 4-hour cap TWICE (runs
    # 28501151268 + 28523846145). The first cancellation was really a
    # CAPTCHA solver failure (0/132 solves due to networkidle wait bug —
    # fixed in commit 92dfe97) so the wall-clock estimate was distorted
    # by all the failed retries. The second run confirmed the CAPTCHA
    # fix (212/215 solves = 98.6%) but STILL didn't finish — 337 notices
    # processed and enrichment was still running when the 240-min cap
    # hit. Wednesday foreclosure volume genuinely exceeds the 4h budget
    # on our current serial scrape+enrich pipeline. 360 min gives ~50%
    # more headroom, absorbing normal Wednesday spikes plus emergency
    # backlog days without cancelling.
    #
    # History:
    #   180 min → 240 min (2026-06-11): 112 notices + BENNETT obit waterfalls
    #   240 min → 360 min (2026-07-01): CAPTCHA fix revealed Wednesday's
    #     genuine 4h+ scrape+enrich wall-clock. seen_ids incremental commits
    #     (bot commit 0afa2c3) mean a re-triggered follow-up run picks up
    #     where the cancelled one left off, so runaway cancellations are
    #     recoverable but disruptive — the extra headroom prevents them.
    #   360 min → 480 min (2026-07-02): Site migrated Google reCAPTCHA to
    #     Cloudflare Turnstile between 06-30 and 07-01. Turnstile solves are
    #     roughly 3-6x slower than the historical baseline (~180s per notice
    #     vs ~30s pre-migration; probe on 2026-07-02 showed attempts 1+2
    #     often fail and only attempt 3 succeeds, so per-notice cost is
    #     inflated even when the solve eventually works). At Wednesday's
    #     ~200-notice volume, 200 × 180s = 10 hours — well over the 6h cap.
    #     8h buys headroom while the CAPTCHA integration stabilizes; may
    #     revisit downward once we understand the attempt-1 failure mode.
    timeout-minutes: 480

    # bash with -e (exit on error) and pipefail so that `cmd | tee` doesn't
    # mask non-zero exits from the python pipeline. With continue-on-error
    # on each pipeline step, a failure surfaces in the step status but
    # subsequent pipelines still run.
    defaults:
      run:
        shell: bash -eo pipefail {0}

    env:
      # ── Data acquisition + parsing ─────────────
      APNA_EMAIL: ${{ secrets.APNA_EMAIL }}
      APNA_PASSWORD: ${{ secrets.APNA_PASSWORD }}
      CAPTCHA_API_KEY: ${{ secrets.CAPTCHA_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # ── Enrichment APIs ─────────────────────────
      SMARTY_AUTH_ID: ${{ secrets.SMARTY_AUTH_ID }}
      SMARTY_AUTH_TOKEN: ${{ secrets.SMARTY_AUTH_TOKEN }}
      OPENWEBNINJA_API_KEY: ${{ secrets.OPENWEBNINJA_API_KEY }}
      FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      # ── Skip-trace + phone validation ──────────
      TRACERFY_API_KEY: ${{ secrets.TRACERFY_API_KEY }}
      TRESTLE_API_KEY: ${{ secrets.TRESTLE_API_KEY }}

      # ── CRM upload + notifications ─────────────
      DATASIFT_EMAIL: ${{ secrets.DATASIFT_EMAIL }}
      DATASIFT_PASSWORD: ${{ secrets.DATASIFT_PASSWORD }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      # ── Dropbox archive sync (added 2026-06-12) ─
      # Used by scripts/daily_finalize.py → dropbox_archive_uploader to
      # ship each run's archive + per-distressor CSVs into the operator's
      # Dropbox/SiftStack/Archives/ folder for local-Mac access via the
      # Dropbox desktop client. Re-uses the existing Dropbox OAuth2 app
      # credentials already configured for src/dropbox_watcher.py. If any
      # are missing/expired, the upload step soft-fails (logs a warning
      # but the workflow still succeeds based on DataSift upload outcomes).
      DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
      DROPBOX_APP_SECRET: ${{ secrets.DROPBOX_APP_SECRET }}
      DROPBOX_REFRESH_TOKEN: ${{ secrets.DROPBOX_REFRESH_TOKEN }}

      # ── LLM backend ─────────────────────────────
      LLM_BACKEND: anthropic

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0  # full history so seen_ids commit-back doesn't conflict

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # Marker that daily_finalize.py uses to find CSVs created during this
      # run + run-id shared across all pipeline-log filenames so the
      # finalizer can pair them up.
      - name: Mark run-start
        id: run_start
        run: |
          mkdir -p output logs
          touch output/.finalize_start
          echo "ts=$(date +%Y%m%d_%H%M%S)" >> $GITHUB_OUTPUT

      # ── Pipeline 1: main.py daily (foreclosure + probate via APN) ──
      # --since yesterday explicitly bounds the scrape window so a stale
      # or missing last_run.json can't trigger a runaway scrape that
      # blows past the job timeout (the first cloud run hit the 3hr cap
      # at 3h 0m 15s because the runner started with empty seen_ids).
      # Output teed to logs/daily_main_<ts>.log so daily_finalize.py can
      # parse it for funnel numbers.
      - name: Run main.py daily (foreclosure + probate)
        continue-on-error: true
        run: |
          SINCE_DATE=$(date -d 'yesterday' '+%Y-%m-%d')
          echo "Using --since ${SINCE_DATE}"
          python src/main.py daily \
            --since "${SINCE_DATE}" \
            --counties Jefferson,Madison,Marshall,Statewide \
            --types foreclosure,probate \
            --tiers 1,2 \
            --no-raw-csv \
            --notify-slack \
            -v 2>&1 | tee logs/daily_main_${{ steps.run_start.outputs.ts }}.log

      # ── Pipeline 2: apn_probate (probate-dedicated post-probate path) ──
      # Runs AFTER main.py because both write seen_ids.json — main.py adds
      # today's IDs, apn_probate then skips them. Inverted order would
      # cause duplicate detail-page CAPTCHA solves.
      - name: Run apn_probate
        continue-on-error: true
        run: |
          python src/apn_probate_pipeline_al.py \
            --counties Jefferson,Madison,Marshall \
            --days-back 2 \
            --tiers 1,2 \
            --max-notices 100 \
            --datasift-csv \
            --skip-trace \
            -v 2>&1 | tee logs/daily_apn_${{ steps.run_start.outputs.ts }}.log

      # ── Pipeline 3: pre_probate (legacy.com obit harvest) ──
      # Independent of seen_ids.json (different data source — Firecrawl-rendered
      # obituary listings). Can run last without ordering concerns.
      - name: Run pre_probate
        continue-on-error: true
        run: |
          python src/pre_probate_pipeline_al.py \
            --markets Birmingham,Huntsville,Marshall \
            --limit 50 \
            --pages 2 \
            --tiers 1,2 \
            --datasift-csv \
            --skip-trace \
            -v 2>&1 | tee logs/daily_pre_${{ steps.run_start.outputs.ts }}.log

      # ── Pipeline 4: code_violation (cross-city unified pipeline) ──
      # Pulls Huntsville Unsafe Buildings PDF + Birmingham Accela + Hoover
      # SeeClickFix in one pass. --enrich-owner runs the tax-roll address
      # lookup (~80% hit rate for owner_name). CSV filename matches the
      # datasift_upload*.csv glob in daily_finalize.py so the consolidated
      # finalizer picks it up; _categorize() recognizes code_violation in
      # row 1's Notice Type. Independent of seen_ids.json — order doesn't
      # matter for ordering with the other pipelines.
      - name: Run code_violation
        continue-on-error: true
        run: |
          python src/code_violation_pipeline.py \
            --counties Jefferson,Madison,Marshall \
            --tiers 1,2 \
            --enrich-owner \
            --skip-trace \
            --output-datasift-csv output/leads/datasift_upload_code_violations_${{ steps.run_start.outputs.ts }}.csv \
            2>&1 | tee logs/daily_code_${{ steps.run_start.outputs.ts }}.log

      # ── Rubin Lublin AL foreclosure schedule ────────────────────────────
      # Public HTML portal at rlselaw.com/property-listing/alabama-property-
      # listings/ — closes the Madison + Marshall coverage gap (APN yields
      # 0 because The Madison County Record is NOT an APN participating
      # publication; verified 2026-07-08). Live snapshot at build time:
      # 117 total AL / 13 tier-qualified (4 Jefferson + 6 Madison + 3 Marshall).
      # CSV writes Notice Type = "foreclosure" so daily_finalize's
      # _categorize() routes it to the Foreclosure DataSift list alongside
      # the APN foreclosure output (DataSift dedupes by property address).
      - name: Run Rubin Lublin AL foreclosures
        continue-on-error: true
        run: |
          python src/rubin_lublin_al_pipeline.py \
            --counties Jefferson,Madison,Marshall \
            --tiers 1,2 \
            --enrich-owner \
            --output-datasift-csv output/leads/datasift_upload_foreclosure_rl_${{ steps.run_start.outputs.ts }}.csv \
            2>&1 | tee logs/daily_rl_${{ steps.run_start.outputs.ts }}.log

      # ── Sunday-only: obit refresh pass (Mark Jerome Green pattern) ──
      # Families update legacy.com obituaries after initial publication
      # (heirs added days/weeks later). Live measurement on 2026-06-19
      # found 24/37 (65%) of past-week pre-probate obits had MORE
      # survivors today than when we first extracted them.
      #
      # Sundays only:
      #   - Adds ~3-5 min when it runs (re-fetch + LLM re-extract ~40 obits)
      #   - Mon-Sat is a no-op
      #   - Downloads last 14 days of own GHA artifacts so the refresh
      #     has historical archives to compare against (today's daily
      #     run alone only produces TODAY's archive)
      # Delta lands in output/leads/datasift_upload_pre_probate_refresh_*.csv
      # — daily_finalize globs it + uploads to the Pre-Probate list
      # automatically (Notice Type column = "pre_probate" routes it).
      - name: Sunday obit refresh (weekly)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "$(date +%u)" != "7" ]; then
            echo "Not Sunday ($(date +%A)) - skipping obit refresh pass"
            exit 0
          fi
          echo "Sunday - running obit refresh pass on last 14 days of archives"
          mkdir -p /tmp/refresh_archives
          # Pull the last ~15 successful daily-sweep artifacts (covers
          # ~14 days even if some days were skipped/failed).
          for RUN in $(gh run list --workflow=daily-sweep.yml --status=success --limit=15 --json databaseId --jq '.[].databaseId'); do
            gh run download "$RUN" --name "siftstack-output-$RUN" \
              --dir "/tmp/refresh_archives/run-$RUN" 2>/dev/null \
              && echo "  pulled run $RUN" \
              || echo "  skipped run $RUN (no matching artifact)"
          done
          python src/obit_refresh_pass.py \
            --archive-dir /tmp/refresh_archives \
            --days-back 14 \
            2>&1 | tee logs/daily_obit_refresh_${{ steps.run_start.outputs.ts }}.log

      # ── DataSift session cookies (fixes Loom-modal failure mode) ──
      # Fresh GHA browsers have no DataSift session cookies → DataSift treats
      # the runner as a first-time user → onboarding modal with a Loom-video
      # tutorial overlay intercepts every wizard click → "Tag input not found"
      # / "Could not find file input element" / Uploaded 0/1 splits on EVERY
      # CSV upload (observed daily 2026-05-22 through 2026-05-27).
      #
      # Fix: persist datasift_cookies.json across runs. save_cookies()/
      # load_cookies() in src/datasift_core.py already handle the file —
      # this just keeps it warm across ephemeral runners.
      #
      # Bootstrap: first run (or whenever the cache is empty) loads cookies
      # from the DATASIFT_COOKIES_B64 secret, which the user set via:
      #   base64 -i datasift_cookies.json | gh secret set DATASIFT_COOKIES_B64
      # Subsequent runs use the cache (save_cookies refreshes the file
      # during each run so the next save covers any session token rotation).
      - name: Restore DataSift session cookies cache
        uses: actions/cache@v4
        with:
          path: datasift_cookies.json
          key: datasift-cookies-${{ github.run_id }}
          restore-keys: |
            datasift-cookies-

      - name: Bootstrap DataSift cookies from secret if cache empty
        run: |
          if [ -f datasift_cookies.json ]; then
            echo "datasift_cookies.json restored from cache ($(wc -c < datasift_cookies.json) bytes)"
          elif [ -n "${{ secrets.DATASIFT_COOKIES_B64 }}" ]; then
            echo "${{ secrets.DATASIFT_COOKIES_B64 }}" | base64 -d > datasift_cookies.json
            echo "Bootstrapped datasift_cookies.json from DATASIFT_COOKIES_B64 secret ($(wc -c < datasift_cookies.json) bytes)"
          else
            echo "WARNING: no cached cookies AND no DATASIFT_COOKIES_B64 secret — DataSift upload likely to fail on first-time-user onboarding modal."
            echo "         Bootstrap via: base64 -i datasift_cookies.json | gh secret set DATASIFT_COOKIES_B64"
          fi

      # ── Consolidated upload + single Slack post ──
      # daily_finalize.py:
      #   (1) parses each daily_<pipeline>_<ts>.log for funnel numbers
      #   (2) globs every datasift_upload*.csv newer than .finalize_start
      #   (3) routes each via upload_to_datasift_per_distressor
      #   (4) posts ONE consolidated Slack with funnel blocks + upload results
      # Exits non-zero if any upload fails so the job surfaces it.
      - name: Upload to DataSift + post Slack
        run: python scripts/daily_finalize.py

      # ── Persistence + observability ──

      - name: Archive output CSVs + logs + state + DataSift screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: siftstack-output-${{ github.run_id }}
          path: |
            output/leads/datasift_upload*.csv
            output/leads/datasift_archive*.csv
            output/raw/al_notices*.csv
            output/deals/*.xlsx
            output/observability/service_rates.json
            logs/*.log
            seen_ids.json
            last_run.json
            datasift_*.png
          retention-days: 30

      # Even on cancellation / partial failure, push current dedup +
      # rolling-rates state back so we don't re-pay cold-start cost OR
      # lose the 7-day rolling-rates baseline on the next run. Uses
      # `git add -f` because output/ + seen_ids.json + last_run.json are
      # all gitignored locally — each developer keeps their own state on
      # their laptop, but the bot needs them tracked on main for
      # cross-run continuity.
      - name: Commit cross-run state back to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f \
            seen_ids.json \
            last_run.json \
            seen_code_violations.json \
            output/observability/service_rates.json \
            2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore(bot): update seen_ids + last_run + rolling rates + code-violation dedup after daily sweep"
            # Rebase-pull in case another commit landed during the run
            git pull --rebase origin main || true
            git push origin HEAD:main
          else
            echo "No state changes to commit — skipping"
          fi

      - name: Notify Slack on workflow failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\":rotating_light: *SiftStack daily sweep FAILED* — workflow run <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_id }}>. Check logs in the Actions tab.\"}" \
            "${{ secrets.SLACK_WEBHOOK_URL }}"
